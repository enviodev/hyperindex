name: Build & Verify

on:
  # pull_request_target lets fork PRs run with repo secrets under a label
  # gate. Check runs attach to the PR head SHA automatically, so branch
  # protection sees them without a separate reporter workflow.
  #
  # Types:
  #   - opened/reopened/synchronize: PR lifecycle; gate blocks fork runs
  #     until a maintainer adds `ok-to-test`.
  #   - labeled: fires when the gate label is added, unblocking the run.
  #
  # Security: the workflow definition is always taken from the base branch,
  # so forks cannot modify gate logic. Jobs explicitly check out the PR
  # head SHA (github.event.pull_request.head.sha) — pinned at checkout so
  # a mid-run force-push on the fork cannot swap code under us.
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main

# Default to read-only; jobs opt into write scopes as needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate ────────────────────────────────────────────────────────────

  # Security gate for pull_request_target: fork code may exfiltrate secrets,
  # so a fork PR only runs when a maintainer applies the `ok-to-test` label
  # *right now*. Pre-existing labels never pass the gate — any other action
  # (opened, reopened, synchronize) on a fork is a no-op. Combined with
  # revoke-approval removing the label on each synchronize, this means:
  #
  #   - push after label    → synchronize → gate skip + label removed
  #   - close/push/reopen   → reopened with stale label → gate still skips
  #   - force-push          → synchronize → gate skip + label removed
  #
  # The only path to run fork CI with secrets is: maintainer reviews a
  # specific HEAD and clicks `ok-to-test`. The checkout pins to the
  # head.sha snapshotted in that labeled event payload, so a subsequent
  # push cannot swap code under the run.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      (github.event.action == 'labeled' && github.event.label.name == 'ok-to-test')
    steps:
      - run: echo "Gate passed (event=${{ github.event_name }} action=${{ github.event.action }})"

  # Revoke approval on each fork push: removes `ok-to-test` so a maintainer
  # must re-approve new commits before CI runs with secrets again.
  # No-op for same-repo PRs (gate admits them unconditionally anyway).
  revoke-approval:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name != github.repository
    permissions:
      pull-requests: write
    steps:
      - name: Remove ok-to-test label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'ok-to-test',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
              core.info('Label not present; nothing to remove.');
            }

  # ── Build ───────────────────────────────────────────────────────────

  # Build envio CLI binary for linux-x64 and wrap it in a platform npm package
  build-linux-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 9
    needs: gate

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: ./.github/actions/cargo-cache
        with:
          cache-suffix: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Build envio CLI
        env:
          SVM_TARGET_PLATFORM: linux-amd64
        run: cargo build --release --bins --target x86_64-unknown-linux-musl

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build platform npm package
        run: |
          node packages/build-envio/build-platform-package.ts \
            --version "0.0.1-dev" --platform "linux" --arch "x64" --out "envio-linux-x64"
          mkdir -p envio-linux-x64/bin
          cp target/x86_64-unknown-linux-musl/release/envio envio-linux-x64/bin/
          chmod +x envio-linux-x64/bin/envio

      - name: Upload linux-x64 platform npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-pkg-envio-linux-x64
          path: envio-linux-x64

  # Build envio base npm package (ReScript compilation, package.json rewrite)
  build-envio-package:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    needs: build-linux-package

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build envio package
        run: node packages/build-envio/src/build-artifact.ts --version 0.0.1-dev --out envio-dist

      - name: Verify artifact
        run: node packages/build-envio/src/verify-artifact.ts envio-dist

      - name: Upload envio npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-pkg-envio
          path: envio-dist

  # ── Verify ──────────────────────────────────────────────────────────

  # Cargo lint and unit tests - no artifacts needed, independent compilation
  cargo-test:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    needs: gate

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/cargo-cache

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo Test
        run: cargo test --no-default-features

  # Hypersync endpoint health check - non-blocking, external dependency
  hypersync-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    continue-on-error: true
    needs: gate

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/cargo-cache

      - name: Hypersync Health Test
        run: cargo test --features integration_tests

  # Template tests - verify envio templates can be initialized and built
  template-tests:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Run template tests
        working-directory: packages/e2e-tests
        run: pnpm test:templates

  # Scenario integration tests
  # Requires DB services (postgres + hasura)
  scenarios-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura:
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: test_codegen
        working-directory: scenarios/test_codegen
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: fuel_test
        working-directory: scenarios/fuel_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: Test Failure Notification
        uses: rjstone/discord-webhook-notify@e3fdffbe09fc784fef3788aecf3ca806719aa7e3
        if: failure() && github.ref == 'refs/heads/main'
        with:
          severity: error
          details: "Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

  # E2E test - runs envio dev with a real indexer scenario
  e2e-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura:
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

      clickhouse:
        image: clickhouse/clickhouse-server:latest
        env:
          CLICKHOUSE_PASSWORD: testing
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 8123:8123

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: Run smoke test
        working-directory: scenarios/e2e_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: Run E2E test
        working-directory: packages/e2e-tests
        run: pnpm test:e2e

      - name: Run dependency completeness tests
        working-directory: packages/e2e-tests
        run: pnpm test:deps

      - name: E2E Test Failure Notification
        uses: rjstone/discord-webhook-notify@e3fdffbe09fc784fef3788aecf3ca806719aa7e3
        if: failure() && github.ref == 'refs/heads/main'
        with:
          severity: error
          details: "E2E Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
