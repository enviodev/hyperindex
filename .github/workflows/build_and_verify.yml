name: Build & Verify

on:
  pull_request_target:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Authorize ──────────────────────────────────────────────────────

  # Routes to the right GitHub Environment:
  #   - push to main          → `internal` (no restrictions)
  #   - same-repo PR          → `internal` (no restrictions)
  #   - fork PR               → `fork-ci`  (requires reviewer approval)
  #
  # Setup (one-time):
  #   Settings → Environments → create `internal` (no rules) and
  #   `fork-ci` (add required reviewers: your team).
  #
  # This replaces the entire /ok-to-test slash-command gate: no
  # issue_comment trigger, no SHA validation, no author_association
  # check, no reaction code. GitHub's environment approval handles
  # authorization natively. Each new fork push triggers a new run
  # that requires fresh approval.
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: >-
      ${{
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name != github.repository &&
        'fork-ci' || 'internal'
      }}
    steps:
      - run: echo "Authorized"

  # Post pending build-verify status on PRs to block merge until CI
  # passes. pull_request_target check runs attach to the default
  # branch SHA (not the PR head), so branch protection can't see them.
  # This commit status fills the gap — configure branch protection to
  # require the `build-verify` context.
  pending-status:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      statuses: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const isFork = context.payload.pull_request.head.repo.full_name !== '${{ github.repository }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'build-verify',
              description: isFork
                ? 'Awaiting environment approval and CI'
                : 'CI running',
            });

  # ── Build ───────────────────────────────────────────────────────────

  # Build envio CLI binary for linux-x64 and wrap it in a platform npm package
  build-linux-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 9
    needs: authorize

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/cargo-cache

      - name: Build envio NAPI addon
        env:
          SVM_TARGET_PLATFORM: linux-amd64
        run: cargo build --release --lib

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build platform npm package
        run: |
          node packages/build-envio/build-platform-package.ts \
            --version "0.0.1-dev" --platform "linux" --arch "x64" --out "envio-linux-x64"
          mkdir -p envio-linux-x64
          cp target/release/libenvio.so envio-linux-x64/envio.node
          echo "=== Platform package contents ==="
          ls -lh envio-linux-x64/

      - name: Upload linux-x64 platform npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-pkg-envio-linux-x64
          path: envio-linux-x64

  # Build envio base npm package (ReScript compilation, package.json rewrite)
  build-envio-package:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    needs: build-linux-package

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build envio package
        run: node packages/build-envio/src/build-artifact.ts --version 0.0.1-dev --out envio-dist

      - name: Verify artifact
        run: node packages/build-envio/src/verify-artifact.ts envio-dist

      - name: Upload envio npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-pkg-envio
          path: envio-dist

  # ── Verify ──────────────────────────────────────────────────────────

  # Cargo lint and unit tests - no artifacts needed, independent compilation
  cargo-test:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    needs: authorize

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/cargo-cache

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo Test
        run: cargo test --no-default-features

  # Hypersync endpoint health check - non-blocking, external dependency
  hypersync-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    continue-on-error: true
    needs: authorize

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/cargo-cache

      - name: Hypersync Health Test
        run: cargo test --features integration_tests

  # Template tests - verify envio templates can be initialized and built
  template-tests:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Run template tests
        working-directory: packages/e2e-tests
        run: pnpm test:templates

  # Scenario integration tests
  # Requires DB services (postgres + hasura)
  scenarios-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura:
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: test_codegen
        working-directory: scenarios/test_codegen
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: fuel_test
        working-directory: scenarios/fuel_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: svm_test
        working-directory: scenarios/svm_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: Test Failure Notification
        uses: rjstone/discord-webhook-notify@e3fdffbe09fc784fef3788aecf3ca806719aa7e3
        if: failure() && github.event_name == 'push'
        with:
          severity: error
          details: "Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

  # E2E test - runs envio dev with a real indexer scenario
  e2e-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura:
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

      clickhouse:
        image: clickhouse/clickhouse-server:26.2.15.4
        env:
          CLICKHOUSE_PASSWORD: testing
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 8123:8123

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: Run smoke test
        working-directory: scenarios/e2e_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: Run E2E test
        working-directory: packages/e2e-tests
        run: pnpm test:e2e

      - name: Run dependency completeness tests
        working-directory: packages/e2e-tests
        run: pnpm test:deps

      - name: E2E Test Failure Notification
        uses: rjstone/discord-webhook-notify@e3fdffbe09fc784fef3788aecf3ca806719aa7e3
        if: failure() && github.event_name == 'push'
        with:
          severity: error
          details: "E2E Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

  # ── Report ──────────────────────────────────────────────────────────

  # Post aggregate build-verify commit status to the PR head SHA (or
  # push SHA). pull_request_target check runs attach to the default
  # branch SHA and are invisible to PR branch protection — this fills
  # the gap. Configure branch protection to require `build-verify`.
  report:
    if: always()
    needs:
      - authorize
      - build-linux-package
      - build-envio-package
      - cargo-test
      - template-tests
      - scenarios-test
      - e2e-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      statuses: write
    steps:
      - name: Post commit status
        uses: actions/github-script@v8
        env:
          RESULTS: ${{ toJSON(needs) }}
        with:
          script: |
            const sha = '${{ github.event.pull_request.head.sha || github.sha }}';
            const needs = JSON.parse(process.env.RESULTS);
            const required = [
              'build-linux-package', 'build-envio-package', 'cargo-test',
              'template-tests', 'scenarios-test', 'e2e-test',
            ];
            const failed = required.filter(n => needs[n]?.result === 'failure');
            const cancelled = required.filter(n => needs[n]?.result === 'cancelled');
            let state, description;
            if (needs.authorize?.result !== 'success') {
              state = 'error';
              description = 'authorize job did not succeed';
            } else if (cancelled.length) {
              state = 'error';
              description = `cancelled: ${cancelled.join(', ')}`;
            } else if (failed.length) {
              state = 'failure';
              description = `failed: ${failed.join(', ')}`;
            } else {
              state = 'success';
              description = 'all jobs passed';
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'build-verify',
              description: description.substring(0, 140),
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
