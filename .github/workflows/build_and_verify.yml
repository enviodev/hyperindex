name: Build & Verify

on:
  # pull_request_target for ALL PRs (same-repo and forks). Runs with
  # secrets. Fork PRs are gated by the `fork-ci` environment which
  # requires manual approval from a reviewer before jobs proceed.
  # Same-repo PRs use the `internal` environment (no restrictions).
  pull_request_target:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Authorize ──────────────────────────────────────────────────────

  # Routes to the right GitHub Environment:
  #   - push to main          → `internal` (no restrictions)
  #   - same-repo PR          → `internal` (no restrictions)
  #   - fork PR               → `fork-ci`  (requires reviewer approval)
  #
  # Setup (one-time):
  #   Settings → Environments → create `internal` (no rules) and
  #   `fork-ci` (add required reviewers: your team).
  #
  # This replaces the entire /ok-to-test slash-command gate: no
  # issue_comment trigger, no SHA validation, no author_association
  # check, no reaction code. GitHub's environment approval handles
  # authorization natively. Each new fork push triggers a new run
  # that requires fresh approval.
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: >-
      ${{
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name != github.repository &&
        'fork-ci' || 'internal'
      }}
    steps:
      - run: echo "Authorized"

  # ── Build ───────────────────────────────────────────────────────────

  # Build envio NAPI addon + wrap it as envio-linux-x64, and build the base
  # envio npm package (ReScript compilation). Fused so we pay for toolchain
  # setup + checkout once — the addon build dominates total time, and the
  # envio package build has no Rust dependency.
  build-envio-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 9
    needs: authorize

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/cargo-cache

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Build envio NAPI addon
        env:
          SVM_TARGET_PLATFORM: linux-amd64
        run: cargo build --release --lib

      - name: Install dependencies
        run: pnpm install

      - name: Build linux-x64 platform npm package
        run: |
          node packages/build-envio/build-platform-package.ts \
            --version "0.0.1-dev" --platform "linux" --arch "x64" --out "envio-linux-x64"
          mkdir -p envio-linux-x64
          cp target/release/libenvio.so envio-linux-x64/envio.node

      - name: Build envio package
        run: node packages/build-envio/src/build-artifact.ts --version 0.0.1-dev --out envio-dist

      - name: Verify envio artifact
        run: node packages/build-envio/src/verify-artifact.ts envio-dist

      - name: Upload linux-x64 platform npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-pkg-envio-linux-x64
          path: envio-linux-x64

      - name: Upload envio npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-pkg-envio
          path: envio-dist

  # ── Verify ──────────────────────────────────────────────────────────

  # Cargo lint and unit tests - no artifacts needed, independent compilation
  cargo-test:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    needs: authorize

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: ./.github/actions/cargo-cache

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo Test
        env:
          # Docker-gated tests (serve robustness/TLS) skip silently when
          # docker is missing; on CI runners that would be a vacuous pass,
          # so require docker and fail loudly instead.
          ENVIO_REQUIRE_DOCKER: "1"
        run: cargo test --no-default-features

  # Hypersync endpoint health check - non-blocking, external dependency
  hypersync-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    continue-on-error: true
    needs: authorize

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/cargo-cache

      - name: Hypersync Health Test
        run: cargo test --features hypersync_health --test hypersync_health

  # Template tests - verify envio templates can be initialized and built
  template-tests:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9
    env:
      ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Run template tests
        working-directory: packages/e2e-tests
        run: pnpm test:templates

  # Scenario integration tests
  # Requires DB services (postgres + hasura)
  scenarios-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9
    env:
      ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

    # postgres/hasura anchors defined here (first job needing them, in file
    # order) and reused via aliases below to avoid repeating the identical
    # `services:` blocks in every job that needs the same containers.
    services:
      postgres: &postgres-service
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura: &hasura-service
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: envio-tests
        working-directory: packages/envio-tests
        run: pnpm test

      - name: test_codegen
        working-directory: scenarios/test_codegen
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: fuel_test
        working-directory: scenarios/fuel_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: svm_test
        working-directory: scenarios/svm_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: Test Failure Notification
        uses: rjstone/discord-webhook-notify@c2597273488aeda841dd1e891321952b51f7996f # v2.2.1
        if: failure() && github.event_name == 'push'
        with:
          severity: error
          description: |
            - **Repository:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            - **Workflow:** [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Event:** ${{ github.event_name }}
            - **Branch:** ${{ github.ref_name }}
            - **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **Triggering Actor:** ${{ github.triggering_actor }}
          details: "Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

  # Differential GraphQL test - envio serve must match real Hasura
  # response-for-response on the recorded corpus. This is the REQUIRED,
  # fast path: it diffs against the committed oracle snapshots
  # (fixtures/differential/snapshots/) instead of a live Hasura instance,
  # so it needs Postgres only. Hasura is used just to *populate* those
  # snapshots (`pnpm record:differential`, run locally/manually whenever
  # the corpus changes, not on every CI run) - see
  # differential-test-live below for the live-Hasura confidence check.
  differential-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9

    services:
      postgres: *postgres-service

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Ensure psql is available
        run: which psql || (sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client)

      - name: Apply fixture schema + seed
        run: |
          PGPASSWORD=testing psql -h localhost -p 5433 -U postgres -d envio-dev -v ON_ERROR_STOP=1 \
            -f packages/e2e-tests/fixtures/differential/schema.sql \
            -f packages/e2e-tests/fixtures/differential/seed.sql

      - name: Start envio serve (default phase)
        uses: ./.github/actions/start-envio-serve

      - name: Diff default phase against oracle snapshots
        working-directory: packages/e2e-tests
        run: pnpm exec tsx src/differential/diffServe.ts

      - name: Restart envio serve (limited phase)
        uses: ./.github/actions/start-envio-serve
        with:
          restart: "true"
          hasura-response-limit: "5"
          hasura-public-aggregate: '["User","Token","SimpleEntity","raw_events","_meta"]'

      - name: Diff limited phase against oracle snapshots
        working-directory: packages/e2e-tests
        run: pnpm exec tsx src/differential/diffServe.ts --phase limited

  # Live-Hasura PR validation. Reuse one Postgres + Hasura environment to
  # verify the committed snapshots, run the full HTTP + WebSocket suite,
  # and exercise envio serve under a short bounded load. Snapshot drift is
  # required; the slower live-parity and soak checks remain informational.
  differential-test-live:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 20

    services:
      postgres: *postgres-service
      hasura: *hasura-service

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: Re-record snapshots against live Hasura
        working-directory: packages/e2e-tests
        run: pnpm record:differential

      - name: Fail on snapshot drift
        run: |
          git add -N packages/e2e-tests/fixtures/differential/snapshots
          git diff --exit-code -- packages/e2e-tests/fixtures/differential/snapshots

      - name: Run live differential suite (HTTP + WebSocket)
        continue-on-error: true
        working-directory: packages/e2e-tests
        run: pnpm test:differential

      - name: Start envio serve
        continue-on-error: true
        uses: ./.github/actions/start-envio-serve

      # 60s bounded soak smoke: server stays up, no 5xx, no fd/RSS blowup.
      # p99-drift comparison is meaningless over windows this short on
      # shared runners, so its threshold is effectively disabled.
      - name: Soak smoke (60s)
        continue-on-error: true
        working-directory: packages/e2e-tests
        run: |
          pnpm exec tsx src/differential/soakLoad.ts \
            --duration 60s --concurrency 16 --p99-drift-multiplier 1000

  # Performance + resource benchmark: envio serve vs a Hasura baseline
  # recorded fresh on the SAME runner in the SAME job (CI hardware varies
  # run to run, so the locally-committed hasura-baseline.json isn't a fair
  # same-machine comparison here). Informational only - never blocks a
  # merge on a regression, since CI runners have enough performance
  # variance on their own that a hard threshold would be flaky.
  differential-benchmark:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 15
    continue-on-error: true

    services:
      postgres: *postgres-service
      hasura: *hasura-service

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: Seed bench dataset + record Hasura baseline
        working-directory: packages/e2e-tests
        run: |
          pnpm exec tsx src/differential/setupBenchDataset.ts
          pnpm exec tsx src/differential/bench.ts --record-baseline --all --budget-ms 800 --min-iters 2 --max-iters 15

      - name: Start envio serve
        uses: ./.github/actions/start-envio-serve

      - name: Benchmark envio serve against the fresh baseline
        working-directory: packages/e2e-tests
        run: pnpm exec tsx src/differential/bench.ts --all --budget-ms 800 --min-iters 2 --max-iters 15

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-report
          path: packages/e2e-tests/bench-report.md
          retention-days: 30

  # E2E test - runs envio dev with a real indexer scenario
  e2e-test:
    runs-on: ubuntu-latest
    needs: build-envio-package
    timeout-minutes: 9
    env:
      ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

    services:
      postgres: *postgres-service
      hasura: *hasura-service

      clickhouse:
        image: clickhouse/clickhouse-server:26.2.15.4
        env:
          CLICKHOUSE_PASSWORD: testing
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 8123:8123

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: Run smoke test
        working-directory: scenarios/e2e_test
        run: |
          pnpm exec envio codegen
          pnpm test

      - name: Run E2E test
        working-directory: packages/e2e-tests
        run: pnpm test:e2e

      - name: Run dependency completeness tests
        working-directory: packages/e2e-tests
        run: pnpm test:deps

      - name: E2E Test Failure Notification
        uses: rjstone/discord-webhook-notify@c2597273488aeda841dd1e891321952b51f7996f # v2.2.1
        if: failure() && github.event_name == 'push'
        with:
          severity: error
          description: |
            - **Repository:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            - **Workflow:** [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Event:** ${{ github.event_name }}
            - **Branch:** ${{ github.ref_name }}
            - **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **Triggering Actor:** ${{ github.triggering_actor }}
          details: "E2E Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
