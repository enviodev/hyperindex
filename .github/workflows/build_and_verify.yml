name: Build & Verify

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

jobs:
  # ── Build ───────────────────────────────────────────────────────────

  # Build the napi native module (.so) for linux-x64.
  # Test jobs download it into packages/envio/envio.node where core.js
  # picks it up via the local-file fallback.
  build-native:
    runs-on: ubuntu-22.04
    timeout-minutes: 9

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build envio native module
        env:
          SVM_TARGET_PLATFORM: linux-amd64
        run: cargo build --release --lib --features napi

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: envio-native
          path: target/release/libenvio.so

  # ── Verify ──────────────────────────────────────────────────────────

  # Cargo unit tests - no artifacts needed, independent compilation
  cargo-test:
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cargo Test
        run: cargo test --no-default-features

      - name: Hypersync Health Test
        run: cargo test --features integration_tests

  # Template tests - verify envio templates can be initialized and built
  template-tests:
    runs-on: ubuntu-latest
    needs: build-native
    timeout-minutes: 9

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Run template tests
        working-directory: packages/e2e-tests
        run: pnpm test:templates

  # Scenario integration tests
  # Requires DB services (postgres + hasura)
  scenarios-test:
    runs-on: ubuntu-latest
    needs: build-native
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura:
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: test_codegen
        working-directory: scenarios/test_codegen
        run: |
          pnpm envio codegen
          pnpm test

      - name: fuel_test
        working-directory: scenarios/fuel_test
        run: |
          pnpm envio codegen
          pnpm test

      - name: Test Failure Notification
        uses: rjstone/discord-webhook-notify@e3fdffbe09fc784fef3788aecf3ca806719aa7e3
        if: failure() && github.ref == 'refs/heads/main'
        with:
          severity: error
          details: "Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

  # E2E test - runs envio dev with a real indexer scenario
  e2e-test:
    runs-on: ubuntu-latest
    needs: build-native
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: envio-dev
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      hasura:
        image: hasura/graphql-engine:v2.43.0
        env:
          HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
          HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
          HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
          HASURA_GRAPHQL_NO_OF_RETRIES: 10
          HASURA_GRAPHQL_ADMIN_SECRET: testing
          HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
          HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
          PORT: 8080
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-envio-artifacts

      - name: Wait for Hasura
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/healthz >/dev/null; then
              echo "Hasura is up"; exit 0; fi; sleep 1; done
          echo "Hasura did not become ready"; exit 1

      - name: Run E2E test
        working-directory: packages/e2e-tests
        run: pnpm test:e2e

      - name: Run dependency completeness tests
        working-directory: packages/e2e-tests
        run: pnpm test:deps

      - name: E2E Test Failure Notification
        uses: rjstone/discord-webhook-notify@e3fdffbe09fc784fef3788aecf3ca806719aa7e3
        if: failure() && github.ref == 'refs/heads/main'
        with:
          severity: error
          details: "E2E Tests Failed on main!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
