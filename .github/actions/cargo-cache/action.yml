name: Cargo cache
description: >
  Cache Cargo registry and build artifacts using Swatinem/rust-cache.
  Unlike a plain actions/cache of target/, it prunes non-dependency and
  stale artifacts before saving. With plain caching the restore-keys
  chain grew the cache monotonically (~5GB compressed) until extraction
  filled the disk on ubuntu-22.04 runners and crashed the job.

inputs:
  cache-suffix:
    description: Extra string appended to the cache key (e.g. a cross-compile target).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: ${{ inputs.cache-suffix }}
