name: Overlay envio artifact
description: >
  Replace packages/envio with the pre-built artifact and place the
  platform binary as a sibling directory inside the package.

runs:
  using: composite
  steps:
    - name: Download pre-built envio package
      shell: bash
      run: rm -rf packages/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: ./packages/envio

    # Place the platform binary as a sibling directory inside the envio
    # package (packages/envio/envio-linux-x64/). This MUST be outside
    # any node_modules/ directory because pnpm prunes packages placed
    # there by non-pnpm tools during workspace installs.
    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: ./packages/envio/envio-linux-x64

    # GitHub Actions artifacts don't preserve Unix permissions
    - name: Restore execute permissions
      shell: bash
      run: chmod +x packages/envio/envio-linux-x64/bin/envio
