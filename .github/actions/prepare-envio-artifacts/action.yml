name: Prepare envio artifacts
description: >
  Download pre-built envio and platform artifacts, place the envio
  package into packages/envio/, and add a pnpm override so that
  envio-linux-x64 resolves from the local directory.
  Must run BEFORE pnpm install.

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    # Replace the dev packages/envio with the production build.
    - name: Overlay envio package
      shell: bash
      run: |
        rm -rf packages/envio
        cp -r .envio-artifacts/envio packages/envio

    # Add a pnpm override so that the envio-linux-x64 optional dependency
    # resolves from the local directory instead of the npm registry.
    - name: Add pnpm override for envio-linux-x64
      shell: bash
      run: |
        node -e '
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.pnpm ??= {};
          pkg.pnpm.overrides ??= {};
          pkg.pnpm.overrides["envio-linux-x64"] = "file:.envio-artifacts/envio-linux-x64";
          fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
        '
