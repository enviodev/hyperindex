name: Prepare envio artifacts
description: >
  Download pre-built envio and platform artifacts, overlay
  packages/envio/ with the production build, and place the
  platform binary as a sibling so bin.mjs finds it via its
  local-path fallback. Must run BEFORE pnpm install.

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    # Replace the dev packages/envio with the production build.
    - name: Overlay envio package
      shell: bash
      run: |
        rm -rf packages/envio
        cp -r .envio-artifacts/envio packages/envio

    # The production package.json has optionalDependencies for all
    # platforms. Strip them so the lockfile check passes — the binary
    # is placed as a sibling directory instead (see next step).
    - name: Strip platform optionalDependencies
      shell: bash
      run: |
        node -e '
          const fs = require("fs");
          const p = "packages/envio/package.json";
          const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
          delete pkg.optionalDependencies;
          fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
        '

    # bin.mjs resolves the binary via join(__dirname, pkg, "bin/envio")
    # before trying node_modules, so a sibling directory works without
    # any pnpm resolution.
    - name: Place platform binary as sibling
      shell: bash
      run: cp -r .envio-artifacts/envio-linux-x64 packages/envio/envio-linux-x64
