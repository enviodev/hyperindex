name: Prepare envio artifacts
description: >
  Set up pnpm + Node.js, download pre-built envio artifacts, and install
  dependencies. The committed .pnpmfile.cjs hook redirects envio
  dependencies to these artifacts instead of the dev workspace member.
  After install, the NAPI addon (.node file) is copied into the installed
  envio package so Core.res can find it via the sibling-file fallback.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10
        run_install: false

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "pnpm"

    - uses: actions/download-artifact@v8
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v8
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile

    # Post-install: inject the NAPI addon into every installed copy of
    # envio. The production artifact intentionally excludes envio.node
    # (it ships via envio-linux-x64), so we copy it in after pnpm install
    # to make Core.res's sibling-file fallback work in CI tests.
    - name: Inject NAPI addon into installed envio
      shell: bash
      run: |
        ADDON="$(pwd)/.envio-artifacts/envio-linux-x64/envio.node"
        if [ ! -f "$ADDON" ]; then
          echo "ERROR: $ADDON not found"
          ls -la .envio-artifacts/envio-linux-x64/
          exit 1
        fi

        # Inject into the artifact source (pnpm links/copies from here)
        cp "$ADDON" .envio-artifacts/envio/envio.node
        echo "Injected into .envio-artifacts/envio/"

        # Find every real envio install location via realpath on pnpm symlinks
        for link in $(find node_modules -maxdepth 3 -name envio -type l 2>/dev/null) \
                     $(find node_modules/.pnpm -maxdepth 4 -path "*/node_modules/envio" -type d 2>/dev/null); do
          real=$(realpath "$link" 2>/dev/null || true)
          if [ -f "$real/src/Core.res.mjs" ]; then
            cp "$ADDON" "$real/envio.node"
            echo "Injected into $real"
          fi
        done
