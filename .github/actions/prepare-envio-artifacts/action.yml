name: Prepare envio artifacts
description: >
  Download pre-built envio and platform artifacts and place the envio
  package into packages/envio/. The committed .pnpmfile.cjs hook
  detects .envio-artifacts/ and redirects envio-linux-x64 automatically.
  Must run BEFORE pnpm install.

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    # Replace the dev packages/envio with the production build.
    - name: Overlay envio package
      shell: bash
      run: |
        rm -rf packages/envio
        cp -r .envio-artifacts/envio packages/envio

