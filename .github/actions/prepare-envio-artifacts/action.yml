name: Prepare envio artifacts
description: >
  Download pre-built envio artifacts and CI lockfile into the workspace.
  The committed .pnpmfile.cjs hook redirects envio dependencies to use
  these artifacts instead of the dev packages/envio workspace member.
  Must run BEFORE pnpm install.

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    - name: Make binary executable
      shell: bash
      run: chmod +x .envio-artifacts/envio-linux-x64/bin/envio

    - uses: actions/download-artifact@v4
      with:
        name: ci-lockfile

    - name: Verify CI lockfile
      shell: bash
      run: |
        if ! head -1 pnpm-lock.yaml | grep -q 'lockfileVersion'; then
          echo "ERROR: downloaded ci-lockfile does not look like a valid lockfile"
          exit 1
        fi
