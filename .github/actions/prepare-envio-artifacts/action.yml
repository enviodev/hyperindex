name: Prepare envio artifacts
description: >
  Download pre-built envio and platform artifacts, overlay
  the compiled sources and production bin.mjs into packages/envio/
  while preserving the dev package.json (so the lockfile stays
  consistent). The committed .pnpmfile.cjs hook adds the
  envio-linux-x64 dependency during pnpm install.
  Must run BEFORE pnpm install.

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    # Overlay compiled sources and production bin.mjs into the
    # workspace member, but keep the dev package.json untouched
    # so pnpm's lockfile check passes.
    - name: Overlay compiled envio files
      shell: bash
      run: |
        artifact=".envio-artifacts/envio"
        target="packages/envio"
        for f in src evm.schema.json fuel.schema.json svm.schema.json \
                 rescript.json index.d.ts index.js bin.mjs; do
          rm -rf "$target/$f"
          cp -r "$artifact/$f" "$target/$f"
        done
