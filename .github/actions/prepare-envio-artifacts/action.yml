name: Prepare envio artifacts
description: >
  Set up pnpm + Node.js, download pre-built envio artifacts, and install
  dependencies. The committed .pnpmfile.cjs hook redirects envio
  dependencies to these artifacts instead of the dev workspace member.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10
        run_install: false

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "pnpm"

    - uses: actions/download-artifact@v8
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v8
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    - name: Inject addon into envio package
      shell: bash
      run: cp .envio-artifacts/envio-linux-x64/envio.node .envio-artifacts/envio/envio.node

    - name: Set addon path for all processes
      shell: bash
      run: echo "ENVIO_NATIVE_ADDON_PATH=$(pwd)/.envio-artifacts/envio-linux-x64/envio.node" >> $GITHUB_ENV

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
