name: Prepare envio artifacts
description: >
  Set up pnpm + Node.js, download the pre-built native module into the
  workspace, and install dependencies. core.js picks up envio.node via
  its local-file fallback.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - uses: actions/download-artifact@v4
      with:
        name: envio-native
        path: packages/envio

    # Rename the cargo cdylib to the .node extension that core.js expects
    - name: Rename native module
      shell: bash
      run: mv packages/envio/libenvio.so packages/envio/envio.node

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
