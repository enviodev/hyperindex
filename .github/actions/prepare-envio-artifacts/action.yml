name: Prepare envio artifacts
description: >
  Set up pnpm + Node.js, download pre-built envio artifacts, and install
  dependencies. Replaces the dev packages/envio workspace member with the
  pre-built artifact so that all workspace dependents use the tested build.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v4
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    - name: Make binary executable
      shell: bash
      run: chmod +x .envio-artifacts/envio-linux-x64/bin/envio

    # Replace the dev workspace member with the pre-built artifact.
    # Remove optionalDependencies (platform packages aren't needed for
    # workspace testing — the binary is used directly from artifacts).
    - name: Replace packages/envio with artifact
      shell: bash
      run: |
        rm -rf packages/envio/src packages/envio/*.json packages/envio/index.*
        cp -r .envio-artifacts/envio/* packages/envio/
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('packages/envio/package.json', 'utf-8'));
          delete pkg.optionalDependencies;
          pkg.private = true;
          fs.writeFileSync('packages/envio/package.json', JSON.stringify(pkg, null, 2) + '\n');
        "

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
