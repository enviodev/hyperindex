name: Prepare envio artifacts
description: >
  Set up pnpm + Node.js, download pre-built envio artifacts, and install
  dependencies. The committed .pnpmfile.cjs hook redirects envio
  dependencies to these artifacts instead of the dev workspace member.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10
        run_install: false

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "pnpm"

    - uses: actions/download-artifact@v8
      with:
        name: npm-pkg-envio
        path: .envio-artifacts/envio

    - uses: actions/download-artifact@v8
      with:
        name: npm-pkg-envio-linux-x64
        path: .envio-artifacts/envio-linux-x64

    - name: Verify artifacts
      shell: bash
      run: |
        echo "=== envio artifact ==="
        ls -la .envio-artifacts/envio/bin.mjs .envio-artifacts/envio/src/Core.res.mjs
        echo "=== envio-linux-x64 artifact ==="
        ls -la .envio-artifacts/envio-linux-x64/
        echo "=== envio-linux-x64 package.json ==="
        cat .envio-artifacts/envio-linux-x64/package.json

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
