# yaml-language-server: $schema=../../../envio/evm.schema.json
name: config1
schema: ../schemas/cross-chain-schema.graphql
description: Gravatar for Ethereum
cross_chain: explicit
chains:
  - id: 1
    rpc:
      url: https://eth.com
      for: sync
    start_block: 0
    contracts:
      - name: Contract1
        abi_file_path: ../abis/Contract1.json
        handler: ./src/EventHandler.js
        address: "0x2E645469f354BB4F5c8a05B3b30A929361cf77eC"
        events:
          - event: "NewGravatar"
          - event: "UpdatedGravatar"
