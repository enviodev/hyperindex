# yaml-language-server: $schema=../../../envio/evm.schema.json
name: skip-one-chain
schema: ../schemas/schema.graphql
contracts:
  - name: Contract1
    abi_file_path: ../abis/Contract1.json
    handler: ./src/EventHandler.js
    events:
      - event: "NewGravatar"
      - event: "UpdatedGravatar"
chains:
  - id: 1
    rpc:
      url: https://eth.com
      for: sync
    start_block: 0
    contracts:
      - name: Contract1
        address: "0x2E645469f354BB4F5c8a05B3b30A929361cf77eC"
  - id: 137
    skip: true
    rpc:
      url: https://polygon.com
      for: sync
    start_block: 0
    contracts:
      - name: Contract1
        address: "0x1E645469f354BB4F5c8a05B3b30A929361cf77eC"
