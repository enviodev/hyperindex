# Verbatim shape of a v2.21.5-era config (scenarios/test_codegen at the
# v2.21.5 tag, trimmed): `networks:`/`rpc_config:` keys that the current
# strict HumanConfig deserializers reject. `envio serve` must still read it.
name: test_codegen
description: Gravatar for Ethereum
rollback_on_reorg: true
save_full_history: false
field_selection:
  transaction_fields:
    - transactionIndex
    - hash
contracts:
  - name: Noop
    handler: ./src/EventHandlers.bs.js
    events:
      - event: "EmptyEvent()"
networks:
  - id: 1337
    rpc_config:
      url: http://localhost:8545
      initial_block_interval: 10000
      backoff_multiplicative: 0.8
      acceleration_additive: 2000
      interval_ceiling: 10000
      backoff_millis: 5000
      query_timeout_millis: 20000
    start_block: 1
    contracts:
      - name: Gravatar
        abi_file_path: abis/gravatar-abi.json
        address: "0x2B2f78c5BF6D9C12Ee1225D5F374aa91204580c3"
        handler: ./src/EventHandlers.bs.js
        events:
          - event: "NewGravatar"
          - event: "UpdatedGravatar"
raw_events: true
