# yaml-language-server: $schema=../../../envio/evm.schema.json
name: tuple-events-config
schema: ../schemas/schema.graphql
# Real Sablier V2 LockupTranched ABI fixture. The sole tuple-bearing event
# (`CreateLockupTranchedStream`) includes a `tuple[]` param (`tranches`) that
# hits a pre-existing contract-import limitation in
# `entity_parsing.rs::from_dyn_sol_type` ("array of tuple") — so this config
# uses non-tuple events for contract-import snapshots and leaves the
# tuple-shape verification to `abi_compat::tests::sablier_real_abi_shape`
# and the `event_template_named_struct_*` snapshots in `codegen_templates.rs`.
description: Sablier V2 LockupTranched — non-tuple events for contract-import snapshots
chains:
  - id: 1
    rpc:
      url: https://eth.com
      for: sync
      initial_block_interval: 10000
      backoff_multiplicative: 0.8
      acceleration_additive: 2000
      interval_ceiling: 10000
      backoff_millis: 5000
      query_timeout_millis: 20000
    start_block: 0
    contracts:
      - name: SablierLockupTranched
        abi_file_path: ../abis/sablier-lockup-tranched.json
        handler: ./src/EventHandler.js
        address: "0xf86B359035208e4529686A1825F2D5BeE38c28A8"
        events:
          - event: "CancelLockupStream"
          - event: "WithdrawFromLockupStream"
