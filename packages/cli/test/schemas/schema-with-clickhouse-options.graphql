#test schema for per-entity ClickHouse table options

type Transfer @storage(clickhouse: {
  partitionBy: "toYYYYMM(timestamp)",
  orderBy: ["timestamp"],
  ttl: "timestamp + INTERVAL 2 YEAR"
}) {
  id: ID!
  timestamp: Timestamp!
  amount: BigInt!
}

type Account @storage(postgres: true, clickhouse: true) {
  id: ID!
}
