[package]
name = "fuel-source"
version = "0.0.1-dev"
edition = "2021"

[lib]
crate-type = ["rlib"]

[dependencies]
anyhow = "1"
hyperfuel-client = "2.2.1"
hyperfuel-format = "3.0.0"
hyperfuel-net-types = "3.0.0"
napi = { version = "=3.8.5", features = ["napi10", "async", "serde-json"] }
napi-derive = "=3.5.4"
tokio = { version = "1.49", features = ["time", "rt-multi-thread"] }
url = "2"
