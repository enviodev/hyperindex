# yaml-language-server: $schema=../../packages/envio/svm.schema.json
name: svm-flow-xray
description: |
  Solana Flow X-Ray: cross-protocol atomic money-flow + contagion radar.
  Indexes Jupiter / Kamino / Drift / Raydium / SPL-Token / System instructions
  with is_inner unset (matches inner + outer) so each tx's CPI tree, token
  deltas, and cross-protocol edges reconstruct in SQL views (sql/views.sql).
ecosystem: svm
chains:
  - rpc: https://api.mainnet-beta.solana.com
    hypersync_config:
      url: https://solana.hypersync.xyz
    # The public endpoint we can reach (solana-demo2 via the /etc/hosts pin to
    # 213.190.30.141) tails ~420.66M, ~2M slots behind mainnet (see Solana
    # Issues P0). Start ~10k slots below its head for a quick backfill + tail.
    start_block: 420650000
    # Bounded window: with Orca/Meteora added the data is ~6x denser (~45 ix/slot),
    # so keep the backfill small enough that each HyperSync query stays well under
    # the client timeout. Without an end_block a heavy query can time out, and the
    # SVM RPC fallback is an unimplemented stub ("Svm does not support getting
    # items") that crashes the run - see Solana Issues. end_block also stops cleanly.
    end_block: 420650200
    programs_experimental:
      # --- IDL-decoded protocols ---
      - name: Jupiter
        program_id: JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4
        idl: idls/jupiter.json
        # Legacy Anchor IDLs carry no inline discriminator; HyperIndex needs the
        # 8-byte sha256("global:<snake_case>")[..8] both to dispatch and to look
        # up the IDL arg/account schema. Computed per instruction below.
        instructions:
          - name: route
            discriminator: "0xe517cb977ae3ad2a"
            field_selection:
              token_balance_fields: true
          - name: sharedAccountsRoute
            discriminator: "0xc1209b3341d69c81"
            field_selection:
              token_balance_fields: true
      - name: Kamino
        program_id: KLend2g3cP87fffoy8q1mQqGKjrxjC8boSyAYavgmjD
        idl: idls/kamino.json
        instructions:
          - name: depositReserveLiquidityAndObligationCollateral
            discriminator: "0x81c70402de271a2e"
            field_selection:
              token_balance_fields: true
          - name: borrowObligationLiquidity
            discriminator: "0x797f12cc49f5e141"
            field_selection:
              token_balance_fields: true
          - name: repayObligationLiquidity
            discriminator: "0x91b20de14cf09348"
            field_selection:
              token_balance_fields: true
          - name: withdrawObligationCollateralAndRedeemReserveCollateral
            discriminator: "0x4b5d5ddc2296dac4"
            field_selection:
              token_balance_fields: true
      - name: Drift
        program_id: dRiftyHA39MWEi3m9aunc5MzRF1JYuBsbn6VPcn33UH
        idl: idls/drift.json
        instructions:
          - name: placePerpOrder
            discriminator: "0x45a15dca787e4cb9"
            field_selection:
              token_balance_fields: true
          - name: fillPerpOrder
            discriminator: "0x0dbcf86786d96af0"
            field_selection:
              token_balance_fields: true
          - name: liquidatePerp
            discriminator: "0x4b2377f7bf128b02"
            field_selection:
              token_balance_fields: true
              log_fields: true
          - name: liquidateSpot
            discriminator: "0x6b00802923e5fb12"
            field_selection:
              token_balance_fields: true
              log_fields: true
          - name: settlePnl
            discriminator: "0x2b3dea2d0f5f9899"
            field_selection:
              token_balance_fields: true
      # --- inline-decoded programs (no Anchor IDL) ---
      # SplToken + System are intentionally NOT matched: they are the
      # highest-frequency instructions on Solana and overwhelm the backfill.
      # Per-tx token movement still arrives via transaction.tokenBalances on the
      # DeFi-protocol events, so value flow is preserved without indexing every
      # transfer. Re-add behind a tight slot window for a single-tx deep dive.
      - name: Raydium
        program_id: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
        instructions:
          # Raydium v4 has no Anchor IDL; positional account order is the canonical
          # SwapBaseIn layout (verify vs a live tx). amountIn/minAmountOut are stable.
          - name: swap
            discriminator: "0x09"
            args:
              - { name: amountIn, type: u64 }
              - { name: minAmountOut, type: u64 }
            accounts:
              - tokenProgram
              - amm
              - ammAuthority
              - ammOpenOrders
              - ammTargetOrders
              - poolCoinTokenAccount
              - poolPcTokenAccount
              - serumProgram
              - serumMarket
              - serumBids
              - serumAsks
              - serumEventQueue
              - serumCoinVaultAccount
              - serumPcVaultAccount
              - serumVaultSigner
              - userSourceTokenAccount
              - userDestTokenAccount
              - userSourceOwner
            field_selection:
              token_balance_fields: true
      # Orca Whirlpool + Meteora DLMM: Anchor 0.30 IDLs (embedded discriminators).
      # Jupiter routes CPI into these too, so they add cross-protocol edges
      # beyond Jupiter->Raydium. Orca/Meteora `swap` share disc 0xf8c6... but
      # dispatch is program-scoped, so no collision.
      - name: Orca
        program_id: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
        idl: idls/orca.json
        instructions:
          - name: swap
            discriminator: "0xf8c69e91e17587c8"
            field_selection:
              token_balance_fields: true
          - name: swap_v2
            discriminator: "0x2b04ed0b1ac91e62"
            field_selection:
              token_balance_fields: true
      - name: Meteora
        program_id: LBUZKhRxPF3XUpBCjp4YzTKgLccjZhTSDM9YuVaPwxo
        idl: idls/meteora.json
        instructions:
          - name: swap
            discriminator: "0xf8c69e91e17587c8"
            field_selection:
              token_balance_fields: true
          - name: swap2
            discriminator: "0x414b3f4ceb5b5b88"
            field_selection:
              token_balance_fields: true
