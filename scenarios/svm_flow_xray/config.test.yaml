# yaml-language-server: $schema=../../packages/envio/svm.schema.json
#
# Test-only config. Mirrors config.yaml but pins a finite slot window so
# src/indexer.test.ts runs the full pipeline deterministically against
# solana.hypersync.xyz. Selected via ENVIO_CONFIG=config.test.yaml.
name: svm-flow-xray
description: Test variant of Flow X-Ray with a finite slot window.
ecosystem: svm
chains:
  - start_block: 420650000
    end_block: 420650008
    experimental:
      hypersync_config:
        url: https://solana.hypersync.xyz
      programs:
        - name: Jupiter
          program_id: JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4
          idl: idls/jupiter.json
          instructions:
            - name: route
              discriminator: "0xe517cb977ae3ad2a"
              field_selection:
                token_balance_fields: true
            - name: sharedAccountsRoute
              discriminator: "0xc1209b3341d69c81"
              field_selection:
                token_balance_fields: true
        - name: Kamino
          program_id: KLend2g3cP87fffoy8q1mQqGKjrxjC8boSyAYavgmjD
          idl: idls/kamino.json
          instructions:
            - name: depositReserveLiquidityAndObligationCollateral
              discriminator: "0x81c70402de271a2e"
              field_selection:
                token_balance_fields: true
            - name: borrowObligationLiquidity
              discriminator: "0x797f12cc49f5e141"
              field_selection:
                token_balance_fields: true
            - name: repayObligationLiquidity
              discriminator: "0x91b20de14cf09348"
              field_selection:
                token_balance_fields: true
            - name: withdrawObligationCollateralAndRedeemReserveCollateral
              discriminator: "0x4b5d5ddc2296dac4"
              field_selection:
                token_balance_fields: true
        - name: Drift
          program_id: dRiftyHA39MWEi3m9aunc5MzRF1JYuBsbn6VPcn33UH
          idl: idls/drift.json
          instructions:
            - name: placePerpOrder
              discriminator: "0x45a15dca787e4cb9"
              field_selection:
                token_balance_fields: true
            - name: fillPerpOrder
              discriminator: "0x0dbcf86786d96af0"
              field_selection:
                token_balance_fields: true
            - name: liquidatePerp
              discriminator: "0x4b2377f7bf128b02"
              field_selection:
                token_balance_fields: true
                log_fields: true
            - name: liquidateSpot
              discriminator: "0x6b00802923e5fb12"
              field_selection:
                token_balance_fields: true
                log_fields: true
            - name: settlePnl
              discriminator: "0x2b3dea2d0f5f9899"
              field_selection:
                token_balance_fields: true
        # SplToken + System dropped from the matched set (volume); token movement
        # comes from transaction.tokenBalances. See config.yaml note.
        - name: Raydium
          program_id: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
          instructions:
            - name: swap
              discriminator: "0x09"
              args:
                - { name: amountIn, type: u64 }
                - { name: minAmountOut, type: u64 }
              accounts:
                - tokenProgram
                - amm
                - ammAuthority
                - ammOpenOrders
                - ammTargetOrders
                - poolCoinTokenAccount
                - poolPcTokenAccount
                - serumProgram
                - serumMarket
                - serumBids
                - serumAsks
                - serumEventQueue
                - serumCoinVaultAccount
                - serumPcVaultAccount
                - serumVaultSigner
                - userSourceTokenAccount
                - userDestTokenAccount
                - userSourceOwner
              field_selection:
                token_balance_fields: true
