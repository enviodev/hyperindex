# Hash comments are ignored by the GraphQL parser and should NOT appear
# in introspection. Only string descriptions ("""...""" or "...") are exposed.

"An ERC-20 transfer event"
type Transfer {
  "Composite ID built from chainId-block-logIndex"
  id: ID!
  "Sender address"
  from: String! @index
  "Recipient address"
  to: String! @index
  "Token amount transferred (raw, no decimals applied)"
  value: BigInt!
  "Block number the transfer was emitted in"
  blockNumber: Int!
  "Hash of the transaction that emitted the transfer"
  transactionHash: String!
}

"An on-chain account participating in transfers"
type Account {
  "The account's Ethereum address"
  id: ID!
  "All transfers sent from this account"
  outgoing: [Transfer!]! @derivedFrom(field: "from")
}
