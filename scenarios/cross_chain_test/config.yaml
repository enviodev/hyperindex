# yaml-language-server: $schema=../../packages/envio/evm.schema.json
name: cross_chain_test
description: Explicit cross-chain mode test indexer
# Entities and effects are per-chain unless marked @crossChain / crossChain:
# per-chain entity rows are scoped by chain id (composite (id, chain_id)
# primary key).
cross_chain: explicit
rollback_on_reorg: false
contracts:
  - name: Counter
    events:
      - event: "Increment()"
chains:
  - id: 1
    start_block: 0
    contracts:
      - name: Counter
        address: "0x0000000000000000000000000000000000000001"
  - id: 137
    start_block: 0
    contracts:
      - name: Counter
        address: "0x0000000000000000000000000000000000000001"
